[advisories]
# "none" skips the unmaintained check; several transitive deps from iroh and
# Tauri are flagged as unmaintained but are not directly upgradeable by us.
unmaintained = "none"
yanked = "deny"

[bans]
# Warn on duplicate versions to keep the dependency tree auditable.
multiple-versions = "warn"
# Note: wildcards = "deny" is intentionally omitted. cargo-deny flags
# workspace-internal path dependencies (which cannot carry a version field)
# as wildcards, producing false positives for every monorepo crate.

[licenses]
allow = [
  "Apache-2.0",
  # Used by target-lexicon and other LLVM/Cranelift-adjacent crates pulled in
  # by Tauri and wasm toolchains. Functionally identical to Apache-2.0 for
  # our purposes.
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "MPL-2.0",
  "Unlicense",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8
