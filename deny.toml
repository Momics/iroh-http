[advisories]
unmaintained = "warn"
yanked = "deny"

[bans]
# Deny multiple versions of the same crate to prevent supply-chain confusion
# and keep the dependency tree auditable.
multiple-versions = "warn"
# Wildcard dependencies in published crates are sloppy and can introduce
# unintended upgrades.
wildcards = "deny"

[licenses]
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "MPL-2.0",
  "Unlicense",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8
