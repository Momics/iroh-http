[package]
name = "iroh-http-core"
version = "0.1.0"
edition = "2021"
description = "Iroh QUIC endpoint, HTTP framing, fetch/serve with FFI-friendly types"
license = "MIT OR Apache-2.0"

[features]
default = []
compression = ["dep:async-compression"]

[dependencies]
iroh-http-framing = { path = "../iroh-http-framing" }
iroh = { workspace = true }
tokio = { workspace = true }
bytes = { workspace = true }
slab = { workspace = true }
tracing = "0.1"
qpack = "0.1.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
url = "2"
rand = "0.9"
async-compression = { version = "0.4", optional = true, features = ["tokio", "zstd"] }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }
bytes = { workspace = true }

