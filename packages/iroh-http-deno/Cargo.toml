[package]
name = "iroh-http-deno"
version = "0.2.1"
edition = "2021"
description = "Deno FFI native library for iroh-http"
license = "MIT OR Apache-2.0"

[lib]
name = "iroh_http_deno"
crate-type = ["cdylib"]

[features]
default = ["discovery", "compression"]
discovery = ["iroh-http-discovery/mdns"]
compression = ["iroh-http-core/compression"]

[dependencies]
iroh-http-core = { path = "../../crates/iroh-http-core" }
iroh-http-adapter = { path = "../../crates/iroh-http-adapter" }
iroh-http-discovery = { path = "../../crates/iroh-http-discovery", optional = true }
tokio = { workspace = true, features = ["rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bytes = { workspace = true }
base64 = "0.22"
slab = { workspace = true }
tracing = "0.1"
dashmap = "6"
