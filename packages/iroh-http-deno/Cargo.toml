[package]
name = "iroh-http-deno"
version = "0.1.0"
edition = "2021"
description = "Deno FFI native library for iroh-http"

[lib]
name = "iroh_http_deno"
crate-type = ["cdylib"]

[dependencies]
iroh-http-core = { path = "../../crates/iroh-http-core" }
tokio = { workspace = true, features = ["rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bytes = { workspace = true }
slab = { workspace = true }
