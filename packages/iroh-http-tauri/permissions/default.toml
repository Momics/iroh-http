"$schema" = "../schemas/schema.json"

[[permission]]
identifier = "default"
description = "Default permissions for iroh-http plugin"
permissions = [
  # Endpoint lifecycle
  "allow-create-endpoint",
  "allow-close-endpoint",
  "allow-ping",

  # Address introspection
  "allow-node-addr",
  "allow-node-ticket",
  "allow-home-relay",
  "allow-peer-info",
  "allow-peer-stats",

  # Streaming primitives
  "allow-next-chunk",
  "allow-send-chunk",
  "allow-finish-body",
  "allow-alloc-body-writer",
  "allow-next-trailer",
  "allow-send-trailers",
  "allow-cancel-request",

  # HTTP client
  "allow-raw-fetch",
  "allow-alloc-fetch-token",
  "allow-cancel-in-flight",

  # HTTP server
  "allow-serve",
  "allow-stop-serve",
  "allow-respond-to-request",

  # Raw / duplex connect
  "allow-raw-connect",
]
