[build-system]
requires      = ["maturin>=1.4,<2"]
build-backend = "maturin"

[project]
name            = "iroh-http"
version         = "0.1.0"
description     = "Peer-to-peer HTTP over QUIC (Iroh) — Python bindings"
requires-python = ">=3.9"
license         = { text = "MIT OR Apache-2.0" }
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

[project.urls]
Homepage = "https://github.com/momics/iroh-http"
Repository = "https://github.com/momics/iroh-http"
Documentation = "https://github.com/momics/iroh-http/tree/main/packages/iroh-http-py"
"Bug Tracker" = "https://github.com/momics/iroh-http/issues"

[project.optional-dependencies]
dev = [
    "pytest>=7",
    "pytest-asyncio>=0.23",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["tests"]

[tool.maturin]
module-name     = "iroh_http.iroh_http_py"
python-packages = ["iroh_http"]
python-source   = "."
features        = ["pyo3/extension-module"]
