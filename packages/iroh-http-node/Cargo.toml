[package]
name = "iroh-http-node"
version = "0.2.1"
edition = "2021"
description = "Node.js native addon for iroh-http (napi-rs)"
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["cdylib"]

[features]
default = ["discovery", "compression"]
discovery = ["iroh-http-discovery/mdns", "iroh"]
compression = ["iroh-http-core/compression"]

[dependencies]
iroh-http-core = { path = "../../crates/iroh-http-core" }
iroh-http-adapter = { path = "../../crates/iroh-http-adapter" }
iroh-http-discovery = { path = "../../crates/iroh-http-discovery", optional = true }
iroh = { workspace = true, optional = true }
napi = { version = "2", features = ["async", "napi9"] }
napi-derive = "2"
tokio = { workspace = true, features = ["rt-multi-thread"] }
bytes = { workspace = true }
slab = { workspace = true }
tracing = "0.1"
serde_json = "1"
dashmap = "6"

[build-dependencies]
napi-build = "1"
