name: Bug report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear description of the incorrect behaviour.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: File paths, error messages, reproduction steps, or test output.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who is affected and how severely.
    validations:
      required: true
  - type: textarea
    id: remediation
    attributes:
      label: Remediation
      description: Suggested fix or investigation steps.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know it's fixed?
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1 — blocks users or breaks protocol
        - P2 — important but has workaround
        - P3 — minor / cosmetic
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - api
        - protocol
        - connectivity
        - observability
        - dx
      description: Primary area affected (matches repo labels).
    validations:
      required: true
