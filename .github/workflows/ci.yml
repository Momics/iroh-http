name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  dependency-review:
    name: Dependency review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  dependency-audit:
    name: Dependency audit (cargo + npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: Swatinem/rust-cache@v2
      - name: cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit \
            --ignore RUSTSEC-2026-0097 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099
      - name: cargo deny (advisories + licenses)
        run: |
          cargo install cargo-deny --locked
          cargo deny check advisories licenses
      - name: npm audit (high+)
        run: |
          npm install
          npm audit --audit-level=high

  rust-check:
    name: Rust check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy (workspace + tauri)
        run: |
          cargo clippy --workspace -- -D warnings
          cd packages/iroh-http-tauri && cargo clippy -- -D warnings
      - name: cargo clippy (security lints)
        run: |
          cargo clippy --workspace -- \
            -W clippy::unwrap_used \
            -W clippy::panic \
            -W clippy::arithmetic_side_effects
          cd packages/iroh-http-tauri && cargo clippy -- \
            -W clippy::unwrap_used \
            -W clippy::panic \
            -W clippy::arithmetic_side_effects
      - name: cargo test (workspace)
        run: cargo test --workspace

  rust-check-no-default-features:
    name: Rust check (no discovery)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (no default features)
        run: |
          cargo check -p iroh-http-node --no-default-features
          cargo check -p iroh-http-deno --no-default-features

  rust-check-features:
    name: Rust check (feature matrix)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ["", "compression"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (features=${{ matrix.features }})
        run: cargo test -p iroh-http-core --features "${{ matrix.features }}"

  typescript-check:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build shared package (needed by dependents)
        run: npm run build --workspace=packages/iroh-http-shared
      - name: Typecheck shared + tauri (node needs napi build)
        run: |
          npm run typecheck --workspace=packages/iroh-http-shared
          npm run typecheck --workspace=packages/iroh-http-tauri

  e2e:
    name: End-to-end tests (Node + Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install npm dependencies
        run: npm install

      - name: Build native libs (ci profile)
        run: cargo build --profile ci -p iroh-http-node -p iroh-http-deno

      # ── Node ──────────────────────────────────────────────────────────────────

      - name: Build shared TypeScript
        run: npm run build --workspace=packages/iroh-http-shared

      - name: napi generate .node + JS wrapper
        run: |
          cd packages/iroh-http-node
          npx napi build --platform --profile ci
          npx tsc

      - name: Run Node e2e tests
        run: node packages/iroh-http-node/test/e2e.mjs

      - name: Node compliance tests
        run: node packages/iroh-http-node/test/compliance.mjs

      # ── Deno ──────────────────────────────────────────────────────────────────

      - name: Copy Deno native lib
        run: |
          mkdir -p packages/iroh-http-deno/lib
          cp target/ci/libiroh_http_deno.so \
             packages/iroh-http-deno/lib/libiroh_http_deno.linux-x86_64.so

      - name: Run Deno tests
        run: deno test --allow-read --allow-ffi --allow-env --allow-net packages/iroh-http-deno/test/smoke.test.ts

      # ── Cross-runtime compliance ──────────────────────────────────────────────

      - name: Cross-runtime compliance (node↔deno)
        run: bash tests/http-compliance/run.sh
