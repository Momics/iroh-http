name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write   # required for npm --provenance

jobs:

  # ── 1. Create GitHub release ──────────────────────────────────────────────────

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          cargo install git-cliff --locked
          git cliff --latest -o RELEASE_NOTES.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md

  # ── 2. Build Node native binaries (4 targets) ─────────────────────────────────

  build-node:
    name: Build Node native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Install cross-compile tools (aarch64 Linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build native addon
        working-directory: packages/iroh-http-node
        run: npx napi build --platform --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Smoke test (host-native targets only)
        if: ${{ !matrix.cross }}
        working-directory: packages/iroh-http-node
        run: node -e "require('./index.js'); console.log('loaded ok')"

      - uses: actions/upload-artifact@v4
        with:
          name: node-native-${{ matrix.target }}
          path: packages/iroh-http-node/*.node
          if-no-files-found: error

  # ── 3. Build Deno native binaries (5 targets) ─────────────────────────────────
  #
  # Linux and Windows targets use cargo-zigbuild from ubuntu-latest.
  # macOS targets build natively on dedicated runners.

  build-deno:
    name: Build Deno native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: libiroh_http_deno.linux-x86_64.so
            lib: libiroh_http_deno.so
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: libiroh_http_deno.linux-aarch64.so
            lib: libiroh_http_deno.so
            zigbuild: true
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            asset: libiroh_http_deno.windows-x86_64.dll
            lib: iroh_http_deno.dll
            zigbuild: true
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: libiroh_http_deno.darwin-aarch64.dylib
            lib: libiroh_http_deno.dylib
          - os: macos-13
            target: x86_64-apple-darwin
            asset: libiroh_http_deno.darwin-x86_64.dylib
            lib: libiroh_http_deno.dylib
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install zig + cargo-zigbuild
        if: matrix.zigbuild
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild --locked

      - name: Build (cargo-zigbuild)
        if: matrix.zigbuild
        run: cargo zigbuild --release -p iroh-http-deno --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.zigbuild }}
        run: cargo build --release -p iroh-http-deno --target ${{ matrix.target }}

      - name: Rename to release asset name
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.lib }} ${{ matrix.asset }}

      - name: Upload to GitHub release
        run: gh release upload ${{ github.ref_name }} ${{ matrix.asset }} --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: deno-native-${{ matrix.target }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  # ── 4. Publish Rust crates ─────────────────────────────────────────────────────
  # Uses crates.io trusted publishing (OIDC) — no token needed.

  publish-crates:
    name: Publish Rust crates
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish iroh-http-core
        run: cargo publish -p iroh-http-core --no-verify

      - name: Publish iroh-http-discovery
        run: cargo publish -p iroh-http-discovery --no-verify

  # ── 5. Publish Node.js packages ───────────────────────────────────────────────
  # Uses npm Trusted Publishers (OIDC) — no NPM_TOKEN needed.
  # One-time setup: npmjs.com → each package → Settings → Trusted Publishers
  # → add this workflow (Momics/iroh-http, release.yml).

  publish-node:
    name: Publish npm (shared + node + tauri)
    runs-on: ubuntu-latest
    needs: build-node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install

      - name: Download all Node native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-native-*
          path: packages/iroh-http-node/
          merge-multiple: true

      - name: Build TypeScript
        run: |
          npm run build --workspace=packages/iroh-http-shared
          cd packages/iroh-http-node && npx tsc
          npm run build --workspace=packages/iroh-http-tauri

      - name: Publish iroh-http-shared
        run: npm publish --workspace packages/iroh-http-shared --access public --provenance

      - name: Publish iroh-http-node
        run: npm publish --workspace packages/iroh-http-node --access public --provenance

      - name: Publish iroh-http-tauri
        run: npm publish --workspace packages/iroh-http-tauri --access public --provenance

  # ── 6. Publish Deno package ────────────────────────────────────────────────────
  # Uses JSR OIDC — no DENO_AUTH_TOKENS needed.
  # One-time setup: jsr.io → each package → Settings → GitHub Actions publishing.

  publish-deno:
    name: Publish Deno package (JSR)
    runs-on: ubuntu-latest
    needs: build-deno
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Publish to JSR
        working-directory: packages/iroh-http-deno
        run: deno publish
