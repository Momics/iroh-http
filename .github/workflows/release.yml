name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write   # required for npm --provenance

jobs:

  # ── 1. Create GitHub release ──────────────────────────────────────────────────

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes
        run: git cliff --latest -o RELEASE_NOTES.md

      - uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md

  # ── 2. Build Node native binaries (4 targets) ─────────────────────────────────

  build-node:
    name: Build Node native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: create-release
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - run: npm ci

      - name: Install cross-compile tools (aarch64 Linux)
        if: matrix.cross && runner.os == 'Linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build native addon
        working-directory: packages/iroh-http-node
        run: npx napi build --platform --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && runner.os == 'Linux' && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Smoke test (host-native targets only)
        if: ${{ !matrix.cross }}
        working-directory: packages/iroh-http-node
        run: node -e "require('./index.js'); console.log('loaded ok')"

      - uses: actions/upload-artifact@v7
        with:
          name: node-native-${{ matrix.target }}
          path: packages/iroh-http-node/iroh-http-node.*.node
          if-no-files-found: error

  # ── 3. Build Deno native binaries (5 targets) ─────────────────────────────────
  #
  # aarch64 Linux uses gcc-aarch64-linux-gnu from apt (same approach as Node).
  # Windows builds natively on windows-latest with MSVC toolchain.
  # macOS targets build natively on dedicated runners.

  build-deno:
    name: Build Deno native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: create-release
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: libiroh_http_deno.linux-x86_64.so
            lib: libiroh_http_deno.so
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: libiroh_http_deno.linux-aarch64.so
            lib: libiroh_http_deno.so
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: libiroh_http_deno.windows-x86_64.dll
            lib: iroh_http_deno.dll
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: libiroh_http_deno.darwin-aarch64.dylib
            lib: libiroh_http_deno.dylib
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: libiroh_http_deno.darwin-x86_64.dylib
            lib: libiroh_http_deno.dylib
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compile tools (aarch64 Linux)
        if: matrix.cross && runner.os == 'Linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build
        run: cargo build --release -p iroh-http-deno --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && runner.os == 'Linux' && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Rename to release asset name
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.lib }} ${{ matrix.asset }}

      - name: Upload to GitHub release
        run: gh release upload ${{ github.ref_name }} ${{ matrix.asset }} --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v7
        with:
          name: deno-native-${{ matrix.target }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  # ── 4. Release-time verification gate ────────────────────────────────────────
  # Runs the full test suite on ubuntu-latest before any artifact is published.
  # publish-crates, publish-node, and publish-deno all depend on this job.

  verify-release:
    name: Verify before publish
    runs-on: ubuntu-latest
    needs: [build-node, build-deno]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - run: npm ci

      - name: Install Tauri system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: cargo test --workspace
        run: cargo test --workspace

      - name: cargo test (iroh-http-tauri)
        run: cargo test --manifest-path packages/iroh-http-tauri/Cargo.toml

      - name: Build shared TypeScript
        run: npm run build --workspace=packages/iroh-http-shared

      - name: TypeScript typecheck
        run: |
          npm run typecheck --workspace=packages/iroh-http-shared
          npm run typecheck --workspace=packages/iroh-http-tauri

  # ── 5. Publish Rust crates ────────────────────────────────────────────────────
  # Uses CARGO_REGISTRY_TOKEN secret. crates.io OIDC trusted publishing is still
  # in limited beta — the token approach is the correct fallback for now.

  publish-crates:
    name: Publish Rust crates
    runs-on: ubuntu-latest
    needs: verify-release
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish iroh-http-core
        run: cargo publish -p iroh-http-core || echo "already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for iroh-http-core to be indexed on crates.io
        run: |
          for i in $(seq 1 12); do
            cargo search iroh-http-core 2>/dev/null | grep -q '^iroh-http-core' && break
            echo "Waiting for crates.io indexing... ($i/12)"
            sleep 15
          done

      - name: Publish iroh-http-discovery
        run: cargo publish -p iroh-http-discovery || echo "already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── 6. Publish Node.js packages ───────────────────────────────────────────────
  # Uses npm Trusted Publishers (OIDC) — no NPM_TOKEN needed.
  # One-time setup per package: npmjs.com → package Settings → Trusted Publishers
  # → add this workflow (Momics/iroh-http, release.yml).
  # Required for: iroh-http-shared, iroh-http-node, iroh-http-tauri,
  # and all 5 iroh-http-node-* platform packages.

  publish-node:
    name: Publish npm (shared + node + tauri)
    runs-on: ubuntu-latest
    needs: verify-release
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Download all Node native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: node-native-*
          path: packages/iroh-http-node/artifacts/
          merge-multiple: true

      - name: Move artifacts into platform package dirs
        working-directory: packages/iroh-http-node
        run: npx napi artifacts --dir artifacts/ --dist npm/

      - name: Publish platform packages
        run: |
          for pkg_dir in packages/iroh-http-node/npm/*/; do
            npm publish "$pkg_dir" --access public --provenance
          done

      - name: Build TypeScript
        run: |
          npm run build --workspace=packages/iroh-http-shared
          cd packages/iroh-http-node && npx tsc
          npm run build --workspace=packages/iroh-http-tauri

      - name: Publish iroh-http-shared
        run: npm publish --workspace packages/iroh-http-shared --access public --provenance

      - name: Publish iroh-http-node
        run: npm publish --workspace packages/iroh-http-node --access public --provenance

      - name: Publish iroh-http-tauri
        run: npm publish --workspace packages/iroh-http-tauri --access public --provenance

  # ── 7. Publish Deno package ────────────────────────────────────────────────────
  # Uses JSR OIDC — no DENO_AUTH_TOKENS needed.
  # One-time setup: jsr.io → each package → Settings → GitHub Actions publishing.

  publish-deno:
    name: Publish Deno package (JSR)
    runs-on: ubuntu-latest
    needs: verify-release
    steps:
      - uses: actions/checkout@v5

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Publish iroh-http-shared to JSR
        working-directory: packages/iroh-http-shared
        run: deno publish

      - name: Publish iroh-http-deno to JSR
        working-directory: packages/iroh-http-deno
        run: deno publish
