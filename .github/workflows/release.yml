name: Release

# Disabled — releasing locally for now. Re-enable when ready:
# on:
#   push:
#     tags:
#       - 'v[0-9]+.[0-9]+.[0-9]+'
on: workflow_dispatch

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  publish-crates:
    name: Publish Rust crates
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish iroh-http-core
        run: cargo publish -p iroh-http-core --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish iroh-http-discovery
        run: cargo publish -p iroh-http-discovery --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-node-native:
    name: Build Node native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build native addon
        working-directory: packages/iroh-http-node
        run: npx napi build --platform --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Smoke test native binary
        working-directory: packages/iroh-http-node
        run: node -e "const n = require('./index.js'); console.log('loaded ok')"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-native-${{ matrix.target }}
          path: packages/iroh-http-node/*.node
          if-no-files-found: error

  publish-node:
    name: Publish Node.js package
    runs-on: ubuntu-latest
    needs: build-node-native
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-native-*
          path: packages/iroh-http-node/
          merge-multiple: true

      - name: Build TypeScript wrapper
        working-directory: packages/iroh-http-node
        run: npx tsc

      - name: Build shared package
        run: npm run build --workspace=packages/iroh-http-shared

      - name: List package contents
        run: ls -la packages/iroh-http-node/*.node packages/iroh-http-node/*.js packages/iroh-http-node/*.d.ts

      - name: Publish iroh-http-node
        run: npm publish --workspace packages/iroh-http-node --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-deno:
    name: Publish Deno package
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Publish to JSR
        run: deno publish --allow-dirty
        working-directory: packages/iroh-http-deno
        env:
          DENO_AUTH_TOKENS: ${{ secrets.DENO_AUTH_TOKEN }}
