name: Extended tests

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: extended-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  test-node:
    name: "Node.js"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: npm ci --omit=optional

      - name: Build native libs
        run: cargo build --profile ci -p iroh-http-node

      - name: Build shared TypeScript
        run: npm run build --workspace=packages/iroh-http-shared

      - name: Build Node binding
        run: |
          cd packages/iroh-http-node
          npx napi build --platform --profile ci
          npx tsc --skipLibCheck

      - name: Run tests
        run: node --test tests/runners/node.mjs

  test-deno:
    name: "Deno"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build native libs
        run: cargo build --profile ci -p iroh-http-deno

      - name: Copy Deno native lib
        run: |
          mkdir -p packages/iroh-http-deno/lib
          cp target/ci/libiroh_http_deno.so \
             packages/iroh-http-deno/lib/libiroh_http_deno.linux-x86_64.so

      - name: Run tests
        run: deno test -A tests/runners/deno.ts
