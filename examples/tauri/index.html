<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iroh-http Tauri Example</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="container">
      <h1>iroh-http</h1>
      <p class="subtitle">peer-to-peer HTTP over QUIC &mdash; Tauri example</p>

      <section class="card">
        <h2>Node Identity</h2>
        <div class="node-id-row">
          <code id="node-id">initializing&hellip;</code>
          <button id="copy-btn" disabled>Copy ID</button>
        </div>
      </section>

      <div class="columns">
        <section class="card">
          <h2>Server</h2>
          <button id="serve-btn">Start serving</button>
          <p id="server-status" class="status"></p>
          <pre id="server-log" class="log"></pre>
        </section>

        <section class="card">
          <h2>Client</h2>
          <form id="fetch-form">
            <label for="peer-input">Peer Node ID</label>
            <input
              id="peer-input"
              type="text"
              placeholder="paste a node ID&hellip;"
              autocomplete="off"
              spellcheck="false"
            />
            <label for="path-input">Path</label>
            <input id="path-input" type="text" value="/hello" />
            <button type="submit">Fetch</button>
          </form>
          <p id="response-status" class="status"></p>
          <pre id="response-body" class="log"></pre>
        </section>
      </div>
    </main>
  </body>
</html>
